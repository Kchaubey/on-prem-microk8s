projectName: "vox-frontend"
projectNamespace: "voxify"

image:
  repository: "harbor.k8s.healthjini.ai:30443/production/vox_frontend"
  tag: "green"
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: gitlab-registry-secret

secrets:
  name: healthjini-vox-secrets

service:
  type: ClusterIP
  port: 8022
  targetPort: 8022

ingress:
  enabled: false

healthCheck:
  enabled: true
  livenessProbe:
    httpGet:
      path: /health
      port: 8022
    initialDelaySeconds: 30
    timeoutSeconds: 5
    periodSeconds: 10
    successThreshold: 1
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /health
      port: 8022
    initialDelaySeconds: 10
    timeoutSeconds: 3
    periodSeconds: 5
    successThreshold: 1
    failureThreshold: 3

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 2

blueGreen:
  activeVersion: green
  scaleDownInactive: true
  inactiveReplicaCount: 0

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

nodeSelector:
  workload-type: prodapp

securityContext:
  fsGroup: 1000
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000

containerSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
