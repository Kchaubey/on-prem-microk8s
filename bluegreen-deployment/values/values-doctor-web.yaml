projectName: "doctor-web"
projectNamespace: "healthjini"

image:
  repository: "harbor.k8s.healthjini.ai:30443/production/doctor_web"
  tag: "green"
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: gitlab-registry-secret

secrets:
  name: healthjini-doctor-secrets
env:
    - name: PORT
      value: "8010"
host:
  - ip: 10.120.130.43
    domain: "backend.k8s.healthjini.ai"
service:
  type: ClusterIP
  port: 8010
  targetPort: 8010

ingress:
  enabled: true
  className: "nginx"
  hosts:
    - host: "doctor.k8s.healthjini.ai"
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: backend-tls
      hosts:
        - doctor.k8s.healthjini.ai

healthCheck:
  enabled: true
  livenessProbe:
    httpGet:
      path: /
      port: 8010
    initialDelaySeconds: 30
    timeoutSeconds: 5
    periodSeconds: 10
    successThreshold: 1
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /
      port: 8010
    initialDelaySeconds: 10
    timeoutSeconds: 3
    periodSeconds: 5
    successThreshold: 1
    failureThreshold: 3

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 3

blueGreen:
  activeVersion: green
  scaleDownInactive: true
  inactiveReplicaCount: 0

resources:
  limits:
    cpu: 1000m
    memory: 1024Mi
  requests:
    cpu: 500m
    memory: 512Mi

nodeSelector:
  workload-type: prodapp

# Pod-level security context
# fsGroup: 1000 ensures Prisma and volume file permissions work correctly for uid 1000
securityContext:
  fsGroup: 1000
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000

# Container-level security context
# Required to satisfy cluster non-root admission policy
containerSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false  # Must stay false — Prisma writes query engine at runtime
