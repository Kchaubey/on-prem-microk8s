projectName: "vox-ai"
projectNamespace: "voxify"
image:
  repository: "docker.merai.app/production/vox_ai"
  tag: "dmz-green"
service:
  type: LoadBalancer
  port: 8020
  targetPort: 8080
healthCheck:
  enabled: true
  livenessProbe:
    httpGet:
      path: /health
      port: 8080
  readinessProbe:
    httpGet:
      path: /ready
      port: 8080
ingress:
  enabled: false
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 3
resources:
  limits:
    cpu: 2000m
    memory: 2048Mi
  requests:
    cpu: 1000m
    memory: 1024Mi
nodeSelector:
  workload-type: prodapp
