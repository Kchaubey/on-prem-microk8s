{{- if .Values.autoscaling.enabled }}
{{- $activeVersion := include "bluegreen.activeVersion" . -}}
{{- $scaleDownInactive := .Values.blueGreen.scaleDownInactive | default false -}}
{{- $renderBlueHPA := or (not $scaleDownInactive) (eq $activeVersion "blue") -}}
{{- $renderGreenHPA := or (not $scaleDownInactive) (eq $activeVersion "green") -}}
{{- if $renderBlueHPA }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Values.projectName }}-hpa
  namespace: {{ .Values.projectNamespace }}
  labels:
    app: {{ .Values.projectName }}
    managed-by: helm
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Values.projectName }}-blue
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: {{ .Values.autoscaling.targetMemoryUtilizationPercentage }}
{{- end }}
{{- if and $renderBlueHPA $renderGreenHPA }}
---
{{- end }}
{{- if $renderGreenHPA }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Values.projectName }}-green-hpa
  namespace: {{ .Values.projectNamespace }}
  labels:
    app: {{ .Values.projectName }}
    managed-by: helm
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Values.projectName }}-green
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: {{ .Values.autoscaling.targetMemoryUtilizationPercentage }}
{{- end }}
{{- end }}
