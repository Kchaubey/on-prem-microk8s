# Global settings
global:
  environment: production
  imagePullPolicy: Always

projectName: "myapp"
projectNamespace: "production"

# Docker Registry
registry:
  url: "registry.example.com:5000"
  username: "${DMZ_REGISTRY_USER}"
  password: "${DMZ_REGISTRY_PASSWORD}"

# Image configuration
image:
  repository: "registry.example.com:5000/production/myapp"
  # Must be provided via project values or CI --set; chart will fail if empty.
  tag: ""
  # Optional per-slot tags. If unset, both deployments use image.tag.
  blueTag: ""
  greenTag: ""
  pullPolicy: Always

# Replica configuration
replicaCount:
  blue: 2
  green: 2

# Optional per-slot deployment strategy overrides.
# Example:
# deploymentStrategy:
#   green:
#     type: Recreate
deploymentStrategy: {}

# Container resources
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

# Horizontal Pod Autoscaler
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

# Service configuration
service:
  type: ClusterIP
  port: 8080
  targetPort: 3000
  annotations: {}

# Ingress configuration
ingress:
  enabled: false
  className: "nginx"
  annotations: {}
  hosts: []
  tls: []

# Environment variables
env: []

# ConfigMap data
configMap:
  enabled: false
  data: {}

# Health checks
healthCheck:
  enabled: true
  livenessProbe:
    httpGet:
      path: /health
      port: 3000
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /health
      port: 3000
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

# Blue-Green specific settings
blueGreen:
  activeVersion: blue
  # When true, only activeVersion keeps replicas/HPA.
  # inactive version is scaled to inactiveReplicaCount (default 0).
  scaleDownInactive: false
  inactiveReplicaCount: 0
  canary:
    enabled: false
    weight: 10

# Node selection
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Security context
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
