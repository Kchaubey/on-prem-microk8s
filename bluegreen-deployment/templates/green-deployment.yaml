{{- $imageTag := required "image.tag (or image.greenTag) must be set" (coalesce .Values.image.greenTag .Values.image.tag) -}}
{{- $secrets := .Values.secrets | default dict -}}
{{- $configMap := .Values.configMap | default dict -}}
{{- $secretName := (index $secrets "name") | default "" -}}
{{- $configMapName := (index $configMap "name") | default "" -}}
{{- $podSecurityContext := omit (.Values.securityContext | default dict) "allowPrivilegeEscalation" "readOnlyRootFilesystem" "capabilities" "privileged" -}}
{{- $strategies := .Values.deploymentStrategy | default dict -}}
{{- $greenStrategy := (index $strategies "green") | default dict -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.projectName }}-green
  namespace: {{ .Values.projectNamespace }}
  labels:
    app: {{ .Values.projectName }}
    version: green
    managed-by: helm
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount.green }}
  {{- end }}
  {{- if $greenStrategy }}
  strategy:
{{ toYaml $greenStrategy | indent 4 }}
  {{- end }}
  selector:
    matchLabels:
      app: {{ .Values.projectName }}
      version: green
  template:
    metadata:
      labels:
        app: {{ .Values.projectName }}
        version: green
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.service.targetPort }}"
        prometheus.io/path: "/metrics"
    spec:

      {{- if $podSecurityContext }}
      securityContext:
{{ toYaml $podSecurityContext | indent 8 }}
      {{- end }}

      containers:
        - name: {{ .Values.projectName }}
          image: "{{ .Values.image.repository }}:{{ $imageTag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "Always" }}

          {{- if .Values.containerSecurityContext }}
          securityContext:
{{ toYaml .Values.containerSecurityContext | indent 12 }}
          {{- end }}

          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP

          {{- if .Values.env }}
          env:
{{ toYaml .Values.env | indent 12 }}
          {{- end }}

          {{- if or $secretName $configMapName }}
          envFrom:
            {{- if $configMapName }}
            - configMapRef:
                name: {{ $configMapName }}
            {{- end }}
            {{- if $secretName }}
            - secretRef:
                name: {{ $secretName }}
            {{- end }}
          {{- end }}

          volumeMounts:
            - name: app-logs
              mountPath: /app/logs

          {{- if .Values.healthCheck.enabled }}
          {{- if .Values.healthCheck.startupProbe }}
          startupProbe:
{{ include "bluegreen.renderProbe" .Values.healthCheck.startupProbe | indent 12 }}
          {{- end }}
          livenessProbe:
{{ include "bluegreen.renderProbe" .Values.healthCheck.livenessProbe | indent 12 }}
          readinessProbe:
{{ include "bluegreen.renderProbe" .Values.healthCheck.readinessProbe | indent 12 }}
          {{- end }}

          {{- if .Values.resources }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
          {{- end }}

      volumes:
        - name: app-logs
          emptyDir: {}

      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml .Values.imagePullSecrets | indent 8 }}
      {{- else }}
      imagePullSecrets:
        - name: gitlab-registry-secret
      {{- end }}

      {{- if .Values.nodeSelector }}
      nodeSelector:
{{ toYaml .Values.nodeSelector | indent 8 }}
      {{- end }}

      {{- if .Values.affinity }}
      affinity:
{{ toYaml .Values.affinity | indent 8 }}
      {{- end }}

      {{- if .Values.tolerations }}
      tolerations:
{{ toYaml .Values.tolerations | indent 8 }}
      {{- end }}
