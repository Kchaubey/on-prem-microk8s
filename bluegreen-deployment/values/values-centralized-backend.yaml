projectName: "centralized-backend"
projectNamespace: "healthjini"

image:
  repository: "harbor.k8s.healthjini.ai:30443/production/centralized_backend"
  tag: "green"
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: gitlab-registry-secret

secrets:
  name: healthjini-backend-secrets

configMap:
  name: healthjini-backend-config

service:
  type: ClusterIP
  port: 8005
  targetPort: 8080

ingress:
  enabled: true
  className: "nginx"
  hosts:
    - host: "backend.k8s.healthjini.ai"
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: backend-tls
      hosts:
        - backend.k8s.healthjini.ai

healthCheck:
  enabled: true
  livenessProbe:
    httpGet:
      path: /health
      port: 8080
    initialDelaySeconds: 30
    timeoutSeconds: 5
    periodSeconds: 10
    successThreshold: 1
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /ready
      port: 8080
    initialDelaySeconds: 10
    timeoutSeconds: 3
    periodSeconds: 5
    successThreshold: 1
    failureThreshold: 3

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 3

resources:
  limits:
    cpu: 1000m
    memory: 1024Mi
  requests:
    cpu: 500m
    memory: 512Mi

nodeSelector:
  workload-type: prodapp

# Pod-level security context — fsGroup ensures Prisma/volume file permissions are correct
securityContext:
  fsGroup: 1000
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000

# Container-level security context — required to satisfy cluster non-root policy
containerSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false   # Keep false if Prisma needs to write query engine at runtime