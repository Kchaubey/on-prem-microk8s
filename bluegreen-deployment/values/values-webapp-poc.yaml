projectName: "webapp-poc"
projectNamespace: "healthjini"

image:
  repository: "harbor.k8s.healthjini.ai:30443/production/webapp_poc"
  tag: "green"
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: gitlab-registry-secret

secrets:
  name: healthjini-webapp-poc-secrets

service:
  type: ClusterIP
  port: 8006
  targetPort: 8006

ingress:
  enabled: false

healthCheck:
  enabled: true
  livenessProbe:
    httpGet:
      path: /health
      port: 8006
    initialDelaySeconds: 30
    timeoutSeconds: 5
    periodSeconds: 10
    successThreshold: 1
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /health
      port: 8006
    initialDelaySeconds: 10
    timeoutSeconds: 3
    periodSeconds: 5
    successThreshold: 1
    failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

nodeSelector:
  workload-type: prodapp

securityContext:
  fsGroup: 1000
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000

containerSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
