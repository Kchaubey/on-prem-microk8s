{{- $imageTag := .Values.image.blueTag | default .Values.image.tag | default "latest" -}}
{{- $secretName := dig "secrets" "name" "" .Values -}}
{{- $configMapName := dig "configMap" "name" "" .Values -}}
{{- $podSecurityContext := omit (.Values.securityContext | default dict) "allowPrivilegeEscalation" "readOnlyRootFilesystem" "capabilities" "privileged" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.projectName }}-blue
  namespace: {{ .Values.projectNamespace }}
  labels:
    app: {{ .Values.projectName }}
    version: blue
    managed-by: helm
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount.blue }}
  {{- end }}
  selector:
    matchLabels:
      app: {{ .Values.projectName }}
      version: blue
  template:
    metadata:
      labels:
        app: {{ .Values.projectName }}
        version: blue
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.service.targetPort }}"
        prometheus.io/path: "/metrics"
    spec:

      {{- if $podSecurityContext }}
      securityContext:
{{ toYaml $podSecurityContext | indent 8 }}
      {{- end }}

      containers:
        - name: {{ .Values.projectName }}
          image: "{{ .Values.image.repository }}:{{ $imageTag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "Always" }}

          {{- if .Values.containerSecurityContext }}
          securityContext:
{{ toYaml .Values.containerSecurityContext | indent 12 }}
          {{- end }}

          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP

          {{- if .Values.env }}
          env:
{{ toYaml .Values.env | indent 12 }}
          {{- end }}

          {{- if or $secretName $configMapName }}
          envFrom:
            {{- if $secretName }}
            - secretRef:
                name: {{ $secretName }}
            {{- end }}
            {{- if $configMapName }}
            - configMapRef:
                name: {{ $configMapName }}
            {{- end }}
          {{- end }}

          volumeMounts:
            - name: app-logs
              mountPath: /app/logs

          {{- if .Values.healthCheck.enabled }}
          livenessProbe:
{{ toYaml .Values.healthCheck.livenessProbe | indent 12 }}
          readinessProbe:
{{ toYaml .Values.healthCheck.readinessProbe | indent 12 }}
          {{- end }}

          {{- if .Values.resources }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
          {{- end }}

      volumes:
        - name: app-logs
          emptyDir: {}

      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml .Values.imagePullSecrets | indent 8 }}
      {{- else }}
      imagePullSecrets:
        - name: gitlab-registry-secret
      {{- end }}

      {{- if .Values.nodeSelector }}
      nodeSelector:
{{ toYaml .Values.nodeSelector | indent 8 }}
      {{- end }}

      {{- if .Values.affinity }}
      affinity:
{{ toYaml .Values.affinity | indent 8 }}
      {{- end }}

      {{- if .Values.tolerations }}
      tolerations:
{{ toYaml .Values.tolerations | indent 8 }}
      {{- end }}
