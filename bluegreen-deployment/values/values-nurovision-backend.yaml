projectName: "nurovision-backend"
projectNamespace: "neuraiq"
image:
  repository: "docker.merai.app/production/nurovision_backend"
  tag: "dmz-green"
service:
  type: LoadBalancer
  port: 8010
  targetPort: 8080
healthCheck:
  enabled: true
  livenessProbe:
    httpGet:
      path: /health
      port: 8080
  readinessProbe:
    httpGet:
      path: /ready
      port: 8080
ingress:
  enabled: false
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 2
resources:
  limits:
    cpu: 1000m
    memory: 1024Mi
  requests:
    cpu: 500m
    memory: 512Mi
nodeSelector:
  workload-type: prodapp